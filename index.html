<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0066ff">
    
    <title>グッズの計算機</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="DOMOTOfavicon.png">

    <style>
        html, body { scrollbar-width: none !important; -ms-overflow-style: none !important; overflow-x: hidden !important; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(to bottom, #f8bbd0, #b3e5fc); background-attachment: fixed; margin: 0; padding: 0 0 100px; }
        h1 { margin: 0; padding: 0 16px; height: 70px; display: flex; flex-direction: column; justify-content: center; background: #0066ff; color: #fff; text-align: center; font-size: 20px; line-height: 1.2; font-weight: 800; }
        .kyokasho { font-family: "YuKyokasho", "游教科書体", serif; font-size: 18px; font-weight: 600; }
        
        .controls {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .segment-container { display: flex; gap: 8px; }
        
        .segment-btn {
            height: 40px;
            width: 120px;
            padding: 0;
            border-radius: 20px;
            border: none;
            background: #ccc;
            color: #777;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.9);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .segment-btn:active { transform: scale(.94); box-shadow: inset 0 2px 6px rgba(0,0,0,.15); }
        .segment-btn.active { background: #fff; color: #000; box-shadow: inset 0 2px 5px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.08); transform: translateY(1px); }
        
        .check {
            display: inline-block;
            width: 14px;
            margin-right: 5px;
        }
        
        .tax-note { padding: 0; font-size: 13px; color: #444; }
        
        .reset-btn { height: 40px; padding: 0 20px; border-radius: 20px; border: none; background: rgba(255,255,255,.92); box-shadow: 0 2px 6px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.9); color: #333; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform .18s ease, box-shadow .18s ease; }
        .reset-btn:active { transform: scale(.94); box-shadow: inset 0 2px 6px rgba(0,0,0,.15); }
        
        .card { background: rgba(255, 255, 255, 0.7); margin: 10px; border-radius: 16px; padding: 14px; backdrop-filter: blur(5px); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); transition: opacity .3s; }
        .card.disabled { opacity: 0.4; }
        .card.disabled .qty-area { pointer-events: none; }
        
        .badge { background: #666; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 11px; margin-left: 8px; }
        .price-area { display: flex; align-items: center; }
        .price { font-weight: 700; color: #183153; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .qty-val { font-size: 22px; font-weight: 800; width: 30px; text-align: center; transition: color .2s ease, transform .18s cubic-bezier(.34,1.56,.64,1); }
        .qty-zero { color: #555; }
        .qty-active { color: #000; }
        .qty-pop { transform: scale(1.18); }
        .qty-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,.92); box-shadow: 0 2px 6px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.9); color: #333; font-size: 22px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .18s ease, box-shadow .18s ease; }
        .qty-btn:active { transform: scale(.94); box-shadow: inset 0 2px 6px rgba(0,0,0,.15); }
        .qty-btn:disabled { opacity: 0.3; }
        
        .item-link { color: #000; text-decoration: underline; display: inline-flex; align-items: center; gap: 4px; }
        .item-link::after { content: ""; display: inline-block; width: 12px; height: 12px; background: currentColor; -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>') no-repeat center; mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>') no-repeat center; }
        
        #bar { position: fixed; left: 0; right: 0; bottom: 0; background: #d91e18; color: #fff; height: 70px; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .bar-left { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
        .info-row { display: flex; align-items: center; font-size: 12px; font-weight: bold; }
        .info-label { width: 140px; display: flex; justify-content: flex-end; align-items: center; }
        .label-text { margin-right: auto; }
        .colon { margin-right: 13px; } 
        .val-text { margin-left: -10px; font-size: 14px; }
        .bar-right { position: relative; width: 140px; height: 70px; }
        .total-label { position: absolute; left: 5px; top: 25px; font-size: 12px; font-weight: bold; }
        .total-val { position: absolute; right: 0; top: 20px; font-size: 23px; font-weight: 800; }
        
        .footer-container { display: flex; flex-direction: column; align-items: flex-end; padding: 10px 16px 12px; gap: 6px; }
        .watermark { opacity: 0.2; font-size: 10px; font-weight: 500; }
    </style>
</head>
<body>
    <h1>グッズの計算機<br><span class="kyokasho">そんなものあるわ</span></h1>
    <div class="controls">
        <div class="tax-note">※すべて税込価格</div>
        <div class="segment-container">
            <button id="seg-tokyo" class="segment-btn" onclick="toggleSeg('tokyo')">東京会場</button>
            <button id="seg-osaka" class="segment-btn" onclick="toggleSeg('osaka')">大阪会場</button>
        </div>
    </div>
    <div id="list"></div>
    <div class="footer-container">
        <button class="reset-btn" onclick="resetAll()">リセット</button>
        <div class="watermark">X：@ah_yummy</div>
    </div>
    <div id="bar">
        <div class="bar-left" id="bar-left-content"></div>
        <div class="bar-right"><div class="total-label">合計</div><div class="total-val" id="total-val-content"></div></div>
    </div>
    <script>
        if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");

        const items = [
            ["フォトパンフ", 3500, 2, false, "https://store.domotofc.jp/detail.php?goods_id=24", "all"],
            ["ポリうちわ", 1300, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=15", "all"],
            ["ハンドタオル", 1900, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=16", "all"],
            ["アクリルスタンド（全3種類）", 1400, 5, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=25", "all"],
            ["アクリルスタンド（コンプリートセット）", 4900, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=23", "all"],
            ["ビッグシルエットTシャツ", 6000, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=12", "all"],
            ["メタリックトート（2way）", 3900, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=17", "all"],
            ["マルチストラップ", 2400, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=18", "all"],
            ["ハンディファン", 5100, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=19", "all"],
            ["ペンライト", 5800, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=20", "all"],
            ["チケットキーホルダー（東京会場Ver.）", 1000, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=21", "tokyo"],
            ["チケットキーホルダー（大阪会場Ver.）", 1000, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=22", "osaka"],
            ["【東京ドームコラボ】Tシャツ BLACK", 6000, 2, true, "https://mitsui-shopping-park.com/ec/p/6260600000036?mallColor=0101", "tokyo"],
            ["【東京ドームコラボ】Tシャツ WHITE", 6000, 2, true, "https://mitsui-shopping-park.com/ec/p/6260600000037?mallColor=0201", "tokyo"]
        ];

        let qty;
        try { qty = JSON.parse(localStorage.getItem("goodsQty")); } catch { qty = null; }
        if (!Array.isArray(qty) || qty.length !== items.length) { qty = Array(items.length).fill(0); }

        let activeSegs = JSON.parse(localStorage.getItem("activeSegs")) || {tokyo: true, osaka: true};

        function toggleSeg(s) {
            if (activeSegs[s] && Object.values(activeSegs).filter(v => v).length === 1) return;
            activeSegs[s] = !activeSegs[s];
            localStorage.setItem("activeSegs", JSON.stringify(activeSegs));
            draw();
        }

        const fmt = n => "¥" + n.toLocaleString();
        function draw() {
            const btnT = document.getElementById("seg-tokyo");
            const btnO = document.getElementById("seg-osaka");
            
            btnT.className = "segment-btn" + (activeSegs.tokyo ? " active" : "");
            btnT.innerHTML = (activeSegs.tokyo ? '<span class="check">✓</span>' : '<span class="check"></span>') + "東京会場";
            
            btnO.className = "segment-btn" + (activeSegs.osaka ? " active" : "");
            btnO.innerHTML = (activeSegs.osaka ? '<span class="check">✓</span>' : '<span class="check"></span>') + "大阪会場";
            
            const listEl = document.getElementById("list");
            listEl.innerHTML = "";
            let total = 0, target = 0;

            items.forEach((it, i) => {
                let available = (it[5] === "all") || (it[5] === "tokyo" && activeSegs.tokyo) || (it[5] === "osaka" && activeSegs.osaka);
                if (available) {
                    total += qty[i] * it[1];
                    if (!it[3]) target += qty[i] * it[1];
                }

                let d = document.createElement("div");
                d.className = "card" + (available ? "" : " disabled");
                d.innerHTML = `<b><a href="${it[4]}" target="_blank" rel="noopener noreferrer" class="item-link">${it[0]}</a></b><div class=row><div class=price-area><div class=price>${fmt(it[1])}</div>${it[3] ? '<span class=badge>購入特典の加算対象外</span>' : ''}</div><div class="qty-area" style="display:flex; align-items:center; gap:8px;"><button class="qty-btn" aria-label="数量を減らす" ${qty[i] == 0 ? 'disabled' : ''} onclick='chg(${i},-1)'>−</button><div class="qty-val ${qty[i] == 0 ? 'qty-zero' : 'qty-active'}">${qty[i]}</div><button class="qty-btn" aria-label="数量を増やす" ${qty[i] >= it[2] ? 'disabled' : ''} onclick='chg(${i},1)'>＋</button></div></div>`;
                listEl.appendChild(d);
            });
            
            let t = Math.floor(target / 15000), next = 15000 - target % 15000;
            if (target > 0 && target % 15000 == 0) next = 15000;
            document.getElementById("bar-left-content").innerHTML = `<div class=info-row><div class=info-label><span class=label-text>🎁 購入特典</span><span class=colon>：</span></div><span class="val-text" style="white-space:nowrap">${t}セット</span></div><div class=info-row><div class=info-label><span class=label-text>✨️ 次の特典まであと</span><span class=colon>：</span></div><span class="val-text" style="white-space:nowrap">¥${next.toLocaleString()}</span></div>`;
            document.getElementById("total-val-content").innerText = fmt(total);
        }

        function chg(i, d) {
            qty[i] = Math.max(0, Math.min(items[i][2], qty[i] + d));
            localStorage.setItem('goodsQty', JSON.stringify(qty));
            draw();
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const vals = document.querySelectorAll(".qty-val");
                    if (vals[i]) {
                        vals[i].classList.add("qty-pop");
                        setTimeout(() => { vals[i].classList.remove("qty-pop"); }, 150);
                    }
                });
            });
        }
        function resetAll() {
            qty.fill(0);
            localStorage.removeItem('goodsQty');
            draw();
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.querySelectorAll(".qty-val").forEach(v => {
                        v.classList.add("qty-pop");
                        setTimeout(() => v.classList.remove("qty-pop"), 150);
                    });
                });
            });
        }
        draw();
    </script>
</body>
</html>
