<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>グッズの計算機</title>
    <style>
        body { font-family: system-ui, sans-serif; background: linear-gradient(to bottom, #f8bbd0, #b3e5fc); background-attachment: fixed; margin: 0; padding: 0 0 100px; }
        h1 { margin: 0; padding: 0 16px; height: 70px; display: flex; flex-direction: column; justify-content: center; background: #0066ff; color: #fff; text-align: center; font-size: 20px; font-weight: 800; }
        .controls { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { height: 40px; padding: 0 20px; border-radius: 20px; border: none; background: rgba(255,255,255,.92); box-shadow: 0 2px 6px rgba(0,0,0,.12); cursor: pointer; }
        .card { background: rgba(255, 255, 255, 0.7); margin: 10px; border-radius: 16px; padding: 14px; backdrop-filter: blur(5px); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .qty-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,.92); cursor: pointer; font-size: 20px; font-weight: bold; }
        .qty-val { font-size: 24px; font-weight: 800; width: 40px; text-align: center; color: #d91e18; transition: transform 0.1s; }
        .qty-pop { transform: scale(1.5); }
        .item-link { color: #000; text-decoration: underline; font-weight: bold; }
        
        #bar { 
            position: fixed; left: 10px; right: 10px; bottom: 10px; 
            background: #d91e18; color: #fff; height: 70px; 
            display: grid; grid-template-columns: 1fr auto; align-items: center; 
            padding: 0 15px; box-sizing: border-box; border-radius: 12px;
            white-space: nowrap;
        }
        .bar-left { font-size: 11px; font-weight: bold; overflow: hidden; }
        .bar-right { display: flex; align-items: center; justify-content: flex-end; }
        .total-label { font-size: 14px; font-weight: bold; margin-right: 20px; }
        .total-val { font-size: 26px; font-weight: 800; text-align: right; width: 140px; }
    </style>
</head>
<body>
    <h1>グッズの計算機</h1>
    <div class="controls">
        <label><input id="filter" type="checkbox"> 選択した商品だけ表示</label>
        <button class="reset-btn" onclick="resetAll()">リセット</button>
    </div>
    <div id="list"></div>
    <div id="bar">
        <div class="bar-left" id="barInfo"></div>
        <div class="bar-right">
            <div class="total-label">合計</div>
            <div class="total-val" id="totalVal">¥0</div>
        </div>
    </div>
    <script>
        const items = [
            ["フォトパンフ", 3500, 2, false, "https://store.domotofc.jp/detail.php?goods_id=24"],
            ["ポリうちわ", 1300, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=15"],
            ["ハンドタオル", 1900, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=16"],
            ["アクリルスタンド（全3種類）", 1400, 5, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=25"],
            ["アクリルスタンド（コンプリートセット）", 4900, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=23"],
            ["ビッグシルエットTシャツ", 6000, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=12"],
            ["メタリックトート（2way）", 3900, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=17"],
            ["マルチストラップ", 2400, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=18"],
            ["ハンディファン", 5100, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=19"],
            ["ペンライト", 5800, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=20"],
            ["チケットキーホルダー（東京会場Ver.）", 1000, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=21"],
            ["【東京ドームコラボ】Tシャツ BLACK", 6000, 2, true, "https://mitsui-shopping-park.com/ec/p/6260600000036?mallColor=0101"],
            ["【東京ドームコラボ】Tシャツ WHITE", 6000, 2, true, "https://mitsui-shopping-park.com/ec/p/6260600000037?mallColor=0201"]
        ];
        let qty = JSON.parse(localStorage.getItem('goodsQty')) || Array(items.length).fill(0);
        function draw() {
            let l = list; l.innerHTML = "";
            let total = 0, target = 0;
            items.forEach((it, i) => {
                total += qty[i] * it[1];
                if (!it[3]) target += qty[i] * it[1];
                if (filter.checked && qty[i] == 0) return;
                let d = document.createElement("div");
                d.className = "card";
                d.innerHTML = `<a href="${it[4]}" target="_blank" class="item-link">${it[0]}</a><div class=row><div>¥${it[1].toLocaleString()}</div><div style="display:flex; align-items:center; gap:8px;"><button class="qty-btn" onclick='chg(${i},-1)'>−</button><div class="qty-val">${qty[i]}</div><button class="qty-btn" onclick='chg(${i},1)'>＋</button></div></div>`;
                l.appendChild(d);
            });
            let t = Math.floor(target / 15000), next = 15000 - target % 15000;
            barInfo.innerHTML = `<div>🎁 特典：${t}セット</div><div>✨️ あと：¥${next.toLocaleString()}</div>`;
            totalVal.innerText = "¥" + total.toLocaleString();
        }
        function chg(i, d) { 
            qty[i] = Math.max(0, Math.min(items[i][2], qty[i] + d)); 
            localStorage.setItem('goodsQty', JSON.stringify(qty)); 
            draw();
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const vals = document.querySelectorAll(".qty-val");
                    if (vals[i]) {
                        vals[i].classList.add("qty-pop");
                        setTimeout(() => { vals[i].classList.remove("qty-pop"); }, 150);
                    }
                });
            });
        }
        function resetAll() { qty.fill(0); localStorage.removeItem('goodsQty'); draw(); }
        filter.onchange = draw; draw();
    </script>
</body>
</html>
