<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>グッズの計算機</title>
    <meta property="og:title" content="グッズの計算機">
    <meta property="og:description" content="グッズ代を計算します。購入特典も計算できます。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ah-yummy.github.io/DOMOTO_calc/_tky">
    <meta property="og:image" content="https://ah-yummy.github.io/DOMOTO_calc_tky/DOMOTOogp.png">
    <meta property="og:site_name" content="グッズの計算機">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="apple-touch-icon" href="DOMOTOfavicon.png">
    <link rel="icon" href="DOMOTOfavicon.png">

    <style>
        body { font-family: system-ui, sans-serif; background: linear-gradient(to bottom, #f8bbd0, #b3e5fc); background-attachment: fixed; margin: 0; padding: 0 0 100px; }
        h1 { margin: 0; padding: 10px 16px; background: #0066ff; color: #fff; text-align: center; font-size: 24px; line-height: 1.3; font-weight: 800; }
        .controls { padding: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .controls button { width: 70px; height: 40px; font-size: 14px; padding: 0; white-space: nowrap; flex-shrink: 0; }
        .tax-note { padding: 0 12px 10px; font-size: 13px; color: #444; }
        .card { background: rgba(255, 255, 255, 0.9); margin: 10px; border-radius: 12px; padding: 12px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15); }
        .ex { background: rgba(236, 236, 236, 0.9); }
        .badge { background: #666; color: #fff; border-radius: 999px; padding: 2px 8px; font-size: 12px; margin-left: 6px; }
        .price { font-weight: 700; color: #183153; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        button { width: 38px; height: 38px; }
        
        .switch-container { display: flex; align-items: center; cursor: pointer; gap: 8px; font-size: 14px; }
        .switch-container input { display: none; }
        .slider { width: 40px; height: 22px; background: #ccc; border-radius: 12px; position: relative; transition: 0.3s; }
        .slider:before { content: ""; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        input:checked + .slider { background: #0066ff; }
        input:checked + .slider:before { transform: translateX(18px); }

        #bar { position: fixed; left: 0; right: 0; bottom: 0; background: #d91e18; color: #fff; padding: 0 10px; box-shadow: 0 -2px 8px rgba(0, 0, 0, .25); display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .bar-left { display: flex; flex-direction: column; justify-content: center; gap: 2px; padding-left: 10px; height: 100%; width: 55%; }
        .bar-right { display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; width: 45%; font-weight: bold; font-size: 20px; }
        .total-container { display: flex; align-items: center; justify-content: flex-end; width: 100%; }
        .info-row { display: flex; align-items: center; font-size: 14px; font-weight: bold; }
        .info-label { width: 135px; flex-shrink: 0; }

        .footer-container { display: flex; justify-content: space-between; align-items: flex-end; padding: 5px 10px; font-size: 12px; color: #666; }
        .watermark { opacity: 0.2; font-size: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <h1>グッズの計算機<br>そんなものあるわ</h1>

    <div class="controls">
        <label class="switch-container">
            <input id="filter" type="checkbox">
            <span class="slider"></span>
            <span>選択した商品だけ表示</span>
        </label>
        <button onclick="resetAll()">リセット</button>
    </div>
    <div class="tax-note">※すべて税込価格</div>

    <div id="list"></div>

    <div class="footer-container">
        <div>※東京ドームコラボTシャツは購入特典対象外です。</div>
        <div class="watermark">X：@ah_yummy</div>
    </div>

    <div id="bar"></div>

    <script>
        const items = [["フォトパンフ", 3500, 2, false], ["ポリうちわ", 1300, 2, false], ["ハンドタオル", 1900, 2, false], ["アクリルスタンド（ランダム全3種類）", 1400, 5, false], ["アクリルスタンド（コンプリートセット）", 4900, 2, false], ["ビッグシルエットTシャツ", 6000, 2, false], ["メタリックトート（2way）", 3900, 2, false], ["マルチストラップ", 2400, 2, false], ["ハンディファン", 5100, 2, false], ["ペンライト", 5800, 2, false], ["チケットキーホルダー（東京会場Ver.）", 1000, 2, false], ["【東京ドームコラボ】Tシャツ BLACK", 6000, 2, true], ["【東京ドームコラボ】Tシャツ WHITE", 6000, 2, true]];
        let qty = Array(items.length).fill(0);
        const fmt = n => "¥" + n.toLocaleString();

        function draw() {
            let l = list;
            l.innerHTML = "";
            let only = filter.checked, total = 0, target = 0;
            items.forEach((it, i) => {
                total += qty[i] * it[1];
                if (!it[3]) target += qty[i] * it[1];
                if (only && qty[i] == 0) return;
                let d = document.createElement("div");
                d.className = "card" + (it[3] ? " ex" : "");
                d.innerHTML = `<b>${it[0]}</b>${it[3] ? '<span class="badge">特典対象外</span>' : ''}<div class=row><div class=price>${fmt(it[1])}</div><div><button style="margin-right:8px;" ${qty[i] == 0 ? 'disabled' : ''} onclick='chg(${i},-1)'>−</button><span style="font-size:20px; font-weight:800; color:${qty[i] == 0 ? '#aaa' : '#000'}; margin-right:8px; display:inline-block; width:25px; text-align:center;">${qty[i]}</span><button ${qty[i] >= it[2] ? 'disabled' : ''} onclick='chg(${i},1)'>＋</button></div></div>`;
                l.appendChild(d);
            });
            let t = Math.floor(target / 15000), next = 15000 - target % 15000;
            if (target > 0 && target % 15000 == 0) next = 15000;
            bar.innerHTML = `<div class=bar-left><div class=info-row><div class=info-label>🎁特典</div>：${t}セット</div><div class=info-row><div class=info-label>✨次の特典まであと</div>：¥${next.toLocaleString()}</div></div><div class=bar-right><div class=total-container>💴合計 ¥${total.toLocaleString()}</div></div>`;
        }

        function chg(i, d) { qty[i] = Math.max(0, Math.min(items[i][2], qty[i] + d)); draw(); }
        function resetAll() { qty.fill(0); draw(); }
        filter.onchange = draw;
        draw();
    </script>
</body>
</html>
